
//html
	<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechStore — Produtos</title>

  <!-- Google Fonts: Syne para títulos + Karla para corpo -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Karla:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       VARIÁVEIS GLOBAIS
       Centralizamos as cores e espaços aqui para fácil manutenção.
       ============================================================ */
    :root {
      --bg:          #0d0d0d;
      --surface:     #161616;
      --surface-2:   #1f1f1f;
      --border:      #2a2a2a;
      --accent:      #e8ff47;
      --accent-dim:  #c8df30;
      --text:        #f0f0f0;
      --text-muted:  #888;
      --text-faint:  #444;
      --danger:      #ff4f4f;

      --radius:      12px;
      --gap:         24px;
    }

    /* ============================================================
       RESET + BASE
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Karla', sans-serif;
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    /* Badge de status da API — muda de cor via JS */
    .api-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }

    .api-badge .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-faint);
      transition: background 0.3s;
    }

    .api-badge.ok  { border-color: #2a3a1a; color: #a8d060; }
    .api-badge.ok  .dot { background: #a8d060; animation: pulse 2s infinite; }
    .api-badge.err { border-color: #3a1a1a; color: var(--danger); }
    .api-badge.err .dot { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ============================================================
       MAIN — área de conteúdo
       ============================================================ */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    /* Título da seção */
    .section-header {
      margin-bottom: 40px;
    }

    .section-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    .section-header h1 em {
      color: var(--accent);
      font-style: normal;
    }

    .section-header p {
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Endpoint pill — mostra a URL que está sendo consumida */
    .endpoint-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-family: monospace;
      font-size: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      color: var(--text-muted);
    }

    .endpoint-pill .method {
      background: var(--accent);
      color: #111;
      font-weight: 700;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: 'Karla', sans-serif;
      letter-spacing: 0.5px;
    }

    /* ============================================================
       GRID DE PRODUTOS
       ============================================================ */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--gap);
    }

    /* ============================================================
       CARD DE PRODUTO
       ============================================================ */
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;

      /* Animação de entrada — staggered via JS */
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.4s ease, transform 0.4s ease,
                  border-color 0.2s ease;
    }

    .product-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .product-card:hover {
      border-color: #404040;
    }

    /* Imagem do produto */
    .card-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: var(--surface-2);
    }

    /* Corpo do card */
    .card-body {
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 6px;
    }

    /* Tag de categoria */
    .card-category {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--accent-dim);
    }

    /* Nome do produto */
    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    /* Descrição */
    .card-description {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

    /* Footer do card: id + preço */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .card-id {
      font-size: 11px;
      color: var(--text-faint);
      font-family: monospace;
    }

    .card-price {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ============================================================
       SKELETON — estado de carregamento
       Os skeletons simulam os cards enquanto a API responde.
       ============================================================ */
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .skeleton-img {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--surface-2);
    }

    .skeleton-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
    .skeleton-line { height: 12px; border-radius: 4px; background: var(--surface-2); }
    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 70%; }

    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ============================================================
       ESTADO DE ERRO
       ============================================================ */
    .error-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      border: 1px dashed #3a1a1a;
      border-radius: var(--radius);
    }

    .error-state .error-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .error-state h2 {
      font-family: 'Syne', sans-serif;
      color: var(--danger);
      margin-bottom: 8px;
    }

    .error-state p {
      color: var(--text-muted);
      font-size: 14px;
      max-width: 400px;
      margin: 0 auto 20px;
    }

    .error-state code {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 13px;
      color: var(--danger);
    }

    .btn-retry {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Karla', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-retry:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ============================================================
       CONTADOR DE RESULTADOS
       ============================================================ */
    .results-count {
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--text-faint);
    }

    .results-count strong {
      color: var(--text-muted);
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      main   { padding: 32px 20px; }
    }
  </style>
</head>
<body>

  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header>
    <div class="logo">tech<span>store</span></div>

    <!--
      Badge que indica o status da API.
      Vai mudar de aparência via JS dependendo se a requisição
      funcionou ou falhou.
    -->
    <div class="api-badge" id="apiBadge">
      <span class="dot"></span>
      <span id="badgeText">conectando...</span>
    </div>
  </header>


  <!-- ============================================================
       CONTEÚDO PRINCIPAL
       ============================================================ -->
  <main>

    <div class="section-header">
      <h1>Todos os <em>Produtos</em></h1>
      <p>Dados consumidos em tempo real da API REST.</p>

      <!--
        Deixamos visível a URL exata que o JS vai chamar.
        Isso é muito útil em aula — o aluno vê a conexão
        entre o código e a requisição.
      -->
      <div class="endpoint-pill">
        <span class="method">GET</span>
        <span id="endpointUrl">http://localhost:8080/api/products</span>
      </div>
    </div>

    <!-- Contador de resultados (preenchido pelo JS) -->
    <div class="results-count" id="resultsCount" style="display:none">
      Exibindo <strong id="productCount">0</strong> produtos
    </div>

    <!-- Grid — começa vazio; o JS injeta os cards aqui -->
    <div class="product-grid" id="productGrid">

      <!--
        Skeletons de carregamento.
        Enquanto a requisição não voltar, o usuário vê
        esses placeholders animados no lugar dos cards reais.
      -->
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line"></div>
        </div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line short"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line"></div>
        </div>
      </div>

    </div><!-- /product-grid -->

  </main>


  <!-- ============================================================
       JAVASCRIPT — lógica de consumo da API

       Fluxo:
         1. Ao carregar a página, chamamos fetchProducts()
         2. Fazemos um GET para a API com fetch()
         3. Convertemos a resposta para JSON
         4. Criamos os cards dinamicamente e inserimos no DOM
         5. Se der erro, mostramos o estado de erro
       ============================================================ -->
  <script>
    // URL da API Spring Boot rodando localmente.
    // Quando fizer deploy, só precisa trocar esta constante.
    const API_URL = 'http://localhost:8080/api/products';

    // Referências aos elementos que vamos manipular
    const grid        = document.getElementById('productGrid');
    const badge       = document.getElementById('apiBadge');
    const badgeText   = document.getElementById('badgeText');
    const resultsDiv  = document.getElementById('resultsCount');
    const countSpan   = document.getElementById('productCount');


    /**
     * Formata um número como moeda brasileira.
     * Ex: 1199 → "R$ 1.199,00"
     */
    function formatPrice(value) {
      return value.toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }


    /**
     * Gera o HTML de um card de produto.
     *
     * Recebe o objeto product que veio do JSON da API
     * e retorna uma string de HTML.
     *
     * Estrutura do objeto (igual ao Java Record):
     *   { id, name, description, price, category, imageUrl }
     */
    function createCard(product) {
      const card = document.createElement('div');
      card.className = 'product-card';

      card.innerHTML = `
        <img
          class="card-img"
          src="${product.imageUrl}"
          alt="${product.name}"
          loading="lazy"
        />
        <div class="card-body">
          <span class="card-category">${product.category}</span>
          <h2 class="card-name">${product.name}</h2>
          <p class="card-description">${product.description}</p>
          <div class="card-footer">
            <span class="card-id">#${product.id}</span>
            <span class="card-price">${formatPrice(product.price)}</span>
          </div>
        </div>
      `;

      return card;
    }


    /**
     * Busca os produtos na API e renderiza os cards.
     *
     * fetch() retorna uma Promise — é a API moderna do browser
     * para fazer requisições HTTP sem precisar de jQuery ou Axios.
     *
     * async/await torna o código mais legível do que .then()/.catch().
     */
    async function fetchProducts() {

      // Garante que os skeletons estejam visíveis enquanto carrega
      // (caso o usuário clique em "tentar novamente")
      grid.innerHTML = `
        <div class="skeleton-card">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line"></div>
          </div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line short"></div>
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line"></div>
          </div>
        </div>
      `;

      try {
        // ── 1. FAZ A REQUISIÇÃO ──────────────────────────────────
        // fetch() retorna uma Promise<Response>.
        // O segundo argumento é opcional — aqui explicitamos o método
        // GET e o header Accept para fins didáticos.
        const response = await fetch(API_URL, {
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });

        // ── 2. VERIFICA O STATUS HTTP ────────────────────────────
        // response.ok é true quando o status está entre 200–299.
        // Se a API retornar 404, 500, etc, lançamos um erro manualmente.
        if (!response.ok) {
          throw new Error(`Status HTTP: ${response.status}`);
        }

        // ── 3. CONVERTE PARA JSON ────────────────────────────────
        // response.json() lê o body da resposta e converte para objeto JS.
        // Isso também é assíncrono, por isso outro await.
        const products = await response.json();

        // ── 4. LIMPA OS SKELETONS ────────────────────────────────
        grid.innerHTML = '';

        // ── 5. RENDERIZA OS CARDS ────────────────────────────────
        products.forEach((product, index) => {
          const card = createCard(product);

          grid.appendChild(card);

          // Animação de entrada staggered:
          // cada card aparece com um pequeno delay a mais que o anterior.
          setTimeout(() => {
            card.classList.add('visible');
          }, index * 80);
        });

        // ── 6. ATUALIZA O CONTADOR E O BADGE ────────────────────
        countSpan.textContent = products.length;
        resultsDiv.style.display = 'block';

        badge.className = 'api-badge ok';
        badgeText.textContent = 'API conectada';

      } catch (error) {
        // ── TRATAMENTO DE ERRO ───────────────────────────────────
        // Chegamos aqui se:
        //   a) A API não está rodando (Connection refused)
        //   b) A API retornou um status de erro (4xx, 5xx)
        //   c) A resposta não é um JSON válido

        console.error('Erro ao buscar produtos:', error);

        // Atualiza o badge para o estado de erro
        badge.className = 'api-badge err';
        badgeText.textContent = 'API offline';

        // Substitui o grid pelo estado de erro
        grid.innerHTML = `
          <div class="error-state">
            <div class="error-icon">⚡</div>
            <h2>Não foi possível carregar</h2>
            <p>
              Verifique se o servidor Spring Boot está rodando em
              <code>localhost:8080</code> e tente novamente.
            </p>
            <button class="btn-retry" onclick="fetchProducts()">
              Tentar novamente
            </button>
          </div>
        `;
      }
    }


    // ── INICIALIZAÇÃO ────────────────────────────────────────────
    // Chamamos fetchProducts() assim que a página termina de carregar.
    fetchProducts();

  </script>

</body>
</html>
